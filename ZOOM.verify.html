<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZOOM FULL VERIFY</title>
<style>
body { background:#000; color:#0ff; font-family:Consolas; padding:20px; }
pre { background:#111; padding:10px; border-radius:6px; }
</style>
<script>
async function load(f){
  const r = await fetch(f);
  return r.ok ? await r.text() : "FEHLT";
}
async function start(){
  const pool = [
    "ZOOM.tmp.txt","zoom.line.txt","zoom.axis.txt","zoom.color.txt",
    "zoom.mask.txt","zoom.scan.txt","zoom.vector.txt","zoom.whirl.txt"
  ];
  let out = "ZOOM FULL VERIFY\n\n";
  for(const f of pool){
    out += "=== " + f + " ===\n" + await load(f) + "\n\n";
  }
  document.getElementById("out").textContent = out;
}
</script>
</head>
<body onload="start()">
<h1>ZOOM FULL VERIFY</h1>
<pre id="out">Lade…</pre>
</body>
</html>
